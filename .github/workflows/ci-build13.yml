name: CI Build

env:
  WORK_DIR: /tmp/seapath_cibuild13_${{ github.run_id }}_${{ github.run_attempt }}_${{ github.sha }}

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  actions: write
  checks: write

jobs:
  CI-build:
    name: Build images
    runs-on: [self-hosted, runner-RTE-cibuild13]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Make build_iso.sh executable (if needed)
        run: chmod +x .release/generate_images.sh

      - name: Run release script
        run: |
          .release/generate_images.sh
        shell: bash

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ./sbom
          if-no-files-found: error

  cve-check:
    name: CVE Check
    needs: CI-build
    uses: ./.github/workflows/_cve-check.yml
    with:
      build-run-id: ${{ github.run_id }}
